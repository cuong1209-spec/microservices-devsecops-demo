name: DevSecOps Security Scanning Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Quét secrets bằng Gitleaks (Parallel Job)
  secret-scan:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # Job 2: Quét mã nguồn tĩnh bằng Semgrep (Parallel Job)
  sast-scan:
    name: Semgrep Static Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=auto --error --exclude=node_modules
        continue-on-error: true

  # Job 3: Quét dependencies bằng Trivy (SCA - Parallel Job)
  # Cấu hình cache cho Trivy DB để tối ưu hóa thời gian chạy
  sca-scan:
    name: Trivy Software Composition Analysis (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Tối ưu hiệu năng: Cache Trivy Vulnerability Database để tránh tải lại toàn bộ database ở mỗi lần chạy
      - name: Cache Trivy Cache Directory
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-trivy-

      # Quét các file cấu hình và package dependencies tĩnh
      - name: Run Trivy SCA (FS Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy

  # Job 4: Build và quét Docker Images (Container Scan)
  # Chỉ chạy sau khi các job phân tích tĩnh song song ở trên đã hoàn thành
  build-and-image-scan:
    name: Build & Container Security Scan
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, sca-scan]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Cache cho Docker layers để tối ưu tốc độ build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tối ưu hiệu năng: Tái sử dụng cache database Trivy cho bước quét image
      - name: Cache Trivy Cache Directory
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-image-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-trivy-image-

      # Build Product Service Image
      - name: Build Product Service Image
        run: |
          docker build -t product-service:latest ./demo-app/product-service

      # Quét Product Service Image bằng Trivy
      - name: Scan Product Service Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'product-service:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy

      # Build Order Service Image
      - name: Build Order Service Image
        run: |
          docker build -t order-service:latest ./demo-app/order-service

      # Quét Order Service Image bằng Trivy
      - name: Scan Order Service Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'order-service:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy
